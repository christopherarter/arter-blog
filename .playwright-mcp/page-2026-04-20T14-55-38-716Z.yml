        - paragraph [ref=e276]: "Your pipeline can grow without becoming a mess:"
        - list [ref=e277]:
          - listitem [ref=e278]: Each new requirement becomes a new step
          - listitem [ref=e279]: Steps can be conditional
          - listitem [ref=e280]: Steps can be decorated with retry logic, logging, or timing
          - listitem [ref=e281]: Steps can be reordered without breaking things
          - listitem [ref=e282]: Failed steps can be retried without affecting other steps
        - paragraph [ref=e283]: The key is that your pipeline represents the “what” of your process - what needs to happen, in what order. The individual steps handle the “how” - how each particular operation should work.
        - paragraph [ref=e284]: This separation makes pipelines a powerful tool for handling complex workflows while keeping your code clean and maintainable. Whether you’re processing user input, handling API responses, or managing complex business workflows, pipelines give you a structured way to express multi-step processes.
