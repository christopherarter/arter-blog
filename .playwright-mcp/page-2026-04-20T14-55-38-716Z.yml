        - paragraph [ref=e222]: "This approach gives you:"
        - list [ref=e223]:
          - listitem [ref=e224]: Easy testing - each step can be tested in isolation
          - listitem [ref=e225]: Simple maintenance - when something breaks, you know exactly where to look
          - listitem [ref=e226]: Reusability - steps can be mixed and matched for different workflows
          - listitem [ref=e227]: Clear boundaries - each step has a clear input and output contract
        - heading "How Data Flows Through Your Application" [level=2] [ref=e228]
        - paragraph [ref=e229]: "In a pipeline, data flows one direction - forward. Each step can:"
        - list [ref=e230]:
          - listitem [ref=e231]: Transform the data
          - listitem [ref=e232]: Validate it
          - listitem [ref=e233]: Enrich it with more information
          - listitem [ref=e234]: Save it somewhere
          - listitem [ref=e235]: Trigger side effects
        - paragraph [ref=e236]: "But it can’t go backwards. This one-way flow makes pipelines predictable and easier to debug:"
