        - generic [ref=e21]: ·
        - generic [ref=e22]: 4 min read
      - heading "A Guide to Laravel Authorization Patterns" [level=1] [ref=e23]
      - generic [ref=e24]:
        - generic [ref=e25]: Written by Chris Arter
        - generic [ref=e26]: ·
        - generic [ref=e27]:
          - text: Published
          - time [ref=e28]: January 20, 2025
    - figure [ref=e29]:
      - img "Laravel Authorization Patterns" [ref=e30]
    - generic [ref=e31]:
      - heading "Authorization Patterns" [level=2] [ref=e32]
      - paragraph [ref=e33]: Almost all systems follow a similar pattern when it comes to authorization. In this post, I’ll highlight how authorization systems generally work, and how those stages can be applied to Laravel. Learning this structure tends to make using other systems easier, and it’s a great way to understand how authorization works in general.
      - paragraph [ref=e34]: The main layers of authorization are below. These may go by different names, but the core concepts are the same. Let’s use driving a car as an analogy.
      - list [ref=e35]:
        - listitem [ref=e36]:
          - strong [ref=e37]: Authentication
          - text: "- Who are you? (Do you have identification?)"
        - listitem [ref=e38]:
          - strong [ref=e39]: Authorization
          - text: "- Are you allowed to do this? (Is your ID a driver’s license?)"
        - listitem [ref=e40]:
          - strong [ref=e41]: Resource Policy
          - text: "- Are you allowed to do this on this resource? (Do you own"
          - emphasis [ref=e42]: this
          - text: car?)
        - listitem [ref=e43]:
          - strong [ref=e44]: Temporal Access
          - text: "- Are you allowed to do this at this time? (Can you drive"
          - emphasis [ref=e45]: this
          - text: car at night?)
      - heading "Authentication" [level=2] [ref=e46]
      - paragraph [ref=e47]: Let’s start with the first stage of the authorization process, authentication. This is the process of verifying your identity. In our analogy, this is your driver’s license.
      - img "Brian Spilner" [ref=e48]
      - paragraph [ref=e49]: This is the process of going from a guest user, to an authenticated user.
      - heading "Using the Auth Facade" [level=3] [ref=e50]:
        - text: Using the
        - code [ref=e51]: Auth
        - text: Facade
      - paragraph [ref=e52]:
        - text: The most straightfoward way to do this in Laravel is to use the
        - code [ref=e53]: Auth
        - text: facade.
      - code [ref=e55]:
        - generic [ref=e56]: Auth::login($user);
      - paragraph [ref=e57]:
        - text: This will set the user’s session, and they will be authenticated using the
        - code [ref=e58]: auth
        - text: middleware.
      - heading "Using Laravel Sanctum" [level=3] [ref=e59]
      - paragraph [ref=e60]: You can also authenticate in a restful way, using a token from Laravel Sanctum.
      - code [ref=e62]:
        - generic [ref=e63]: $token = $user->createToken('auth_token')->plainTextToken;
      - paragraph [ref=e64]:
        - text: Once you have a token, you can use it to authenticate requests to your API through the
        - code [ref=e65]: Authorization
        - text: header using the
        - code [ref=e66]: auth:sanctum
        - text: middleware.
      - code [ref=e68]:
        - generic [ref=e69]: $response = Http::withHeaders([
        - generic [ref=e70]: "'Authorization' => 'Bearer ' . $token,"
        - generic [ref=e71]: "])->get('https://api.example.com/user');"
      - heading "Socialite" [level=3] [ref=e72]
      - paragraph [ref=e73]: You can also use Socialite to authenticate users.
      - code [ref=e75]:
        - generic [ref=e76]: $user = Socialite::driver('github')->user();
      - paragraph [ref=e77]: This will use an external application to authenticate the user, and then return a user object.
      - list [ref=e78]:
        - listitem [ref=e79]:
          - link "Laravel Socialite" [ref=e80] [cursor=pointer]:
            - /url: https://laravel.com/docs/socialite
        - listitem [ref=e81]:
          - link "Authentication" [ref=e82] [cursor=pointer]:
            - /url: https://laravel.com/docs/authentication
        - listitem [ref=e83]:
          - link "Sanctum" [ref=e84] [cursor=pointer]:
            - /url: https://laravel.com/docs/sanctum
      - heading "Authorization & Resource Policy" [level=2] [ref=e85]
      - paragraph [ref=e86]: The second stage of the authorization process is authorization. This is the process of verifying that you are allowed to do something.
      - heading "Using the Gate Facade" [level=3] [ref=e87]:
        - text: Using the
        - code [ref=e88]: Gate
        - text: Facade
      - paragraph [ref=e89]:
        - text: The most straightfoward way to do this in Laravel is to use the
        - code [ref=e90]: Gate
        - text: facade.
      - code [ref=e92]:
        - generic [ref=e93]: "Gate::allows('update-post', function ($user, $post) {"
        - generic [ref=e94]: return $user->id === $post->user_id;
        - generic [ref=e95]: "});"
      - paragraph [ref=e96]:
        - text: This will return a boolean value, indicating whether the user is allowed to update the post and is defined in the
        - code [ref=e97]: boot
        - text: method of the
        - code [ref=e98]: AppServiceProvider
        - text: class.
      - paragraph [ref=e99]: This is the most basic form of authorization, and it’s a great way to start. But, as your application grows, organization becomes more important.
      - heading "Using Policies" [level=3] [ref=e100]
      - paragraph [ref=e101]: Policies are a great way to organize your authorization logic. They allow you to group related authorization logic into a single class for a given eloquent model. They are also automatically recognized by very popular packages like Filament.
      - code [ref=e103]:
        - generic [ref=e104]: class PostPolicy
        - generic [ref=e105]: "{"
        - generic [ref=e106]: public function update(User $user, Post $post)
        - generic [ref=e107]: "{"
        - generic [ref=e108]: return $user->id === $post->user_id;
        - generic [ref=e109]: "}"
        - generic [ref=e110]: "}"
      - heading "Roles and Permissions" [level=3] [ref=e111]
      - paragraph [ref=e112]:
        - text: The most robust way to handle authorization is to use roles and permissions. This allows you to define a set of permissions for a given role, and then assign roles to users. Spatie has a great package for this, called
        - link "Laravel Permission" [ref=e113] [cursor=pointer]:
          - /url: https://spatie.be/docs/laravel-permission
        - text: ", and is a personal favorite of mine."
      - paragraph [ref=e114]:
        - text: Let’s show how this works with our PostPolicy example above, and add an aditional capability check for the
        - code [ref=e115]: update
        - text: method.
      - code [ref=e117]:
        - generic [ref=e118]: class PostPolicy
        - generic [ref=e119]: "{"
        - generic [ref=e120]: public function update(User $user, Post $post)
        - generic [ref=e121]: "{"
        - generic [ref=e122]: return $user->hasPermissionTo('update-post') && $user->id === $post->user_id;
        - generic [ref=e123]: "}"
        - generic [ref=e124]: "}"
      - paragraph [ref=e125]:
        - text: This will check if the user has the
        - code [ref=e126]: update-post
        - text: permission,
        - emphasis [ref=e127]: and
        - text: "that they own the post. This is a blend of both Authorization and Resource Policy. In AWS, a similar policy may be written as:"
      - code [ref=e129]:
        - generic [ref=e130]: "{"
        - generic [ref=e131]: "\"Effect\": \"Allow\","
        - generic [ref=e132]: "\"Action\": [\"s3:PutObject\"],"
        - generic [ref=e133]: "\"Resource\": [\"arn:aws:s3:::my-bucket/*\"]"
        - generic [ref=e134]: "}"
      - paragraph [ref=e135]:
        - text: The key is that a user must be allowed to do something, and then they must have the right to do it on a given resource. So in our car example, just because you have a driver’s license, doesn’t mean you can drive any car. You must have the right to drive
        - emphasis [ref=e136]: this
        - text: car.
      - list [ref=e137]:
        - listitem [ref=e138]:
          - link "Laravel Permission" [ref=e139] [cursor=pointer]:
            - /url: https://spatie.be/docs/laravel-permission
        - listitem [ref=e140]:
          - link "Policies" [ref=e141] [cursor=pointer]:
            - /url: https://laravel.com/docs/authorization#policies
        - listitem [ref=e142]:
          - link "Gates" [ref=e143] [cursor=pointer]:
            - /url: https://laravel.com/docs/authorization#gates
      - heading "Temporal Access" [level=2] [ref=e144]
      - paragraph [ref=e145]: The final stage of the authorization process is temporal access. This is the process of verifying that you are allowed to do something at a given time.
      - paragraph [ref=e146]: The most common way to do this in Laravel is adding an expiration date to a Sanctum token.
      - code [ref=e148]:
        - generic [ref=e149]: $token = $user->createToken('auth_token', ['update-post'], now()->addMinutes(15))->plainTextToken;
      - paragraph [ref=e150]:
        - text: This will create a token that expires in 15 minutes, and only allows the
        - code [ref=e151]: update-post
        - text: action.
      - paragraph [ref=e152]:
        - text: For traditional
        - code [ref=e153]: web
        - text: guard sessions, this can be handled by things like session lifetimes.
